# Runtime overrides for packaged backend.
# Place at: ./config/runtime.yml (same level as backend jar)

server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/food_forum?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456

app:
  upload-path: ./uploads
  auth:
    token-secret: change-me-before-demo
  ai:
    enabled: false
    base-url: https://api.deepseek.com/v1
    model: deepseek-chat
    api-key: ""
