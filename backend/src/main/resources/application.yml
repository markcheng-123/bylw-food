server:
  port: 8080
  servlet:
    encoding:
      enabled: true
      charset: UTF-8
      force: true

spring:
  application:
    name: food-forum-backend
  config:
    import:
      - optional:file:./config/runtime.yml
      - optional:file:./config/local-secrets.yml
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 200MB
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/food_forum?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

app:
  upload-path: ./uploads
  upload:
    oss-enabled: false
    endpoint: oss-cn-hangzhou.aliyuncs.com
    bucket: food-forum-assets
    access-key-id: ""
    access-key-secret: ""
    dir-prefix: bylw/
    public-base-url: https://food-forum-assets.oss-cn-hangzhou.aliyuncs.com
  auth:
    token-secret: change-me-before-demo
    token-expire-hours: 168
  ai:
    enabled: false
    base-url: https://api.deepseek.com/v1
    model: deepseek-chat
    api-key: ""
    system-prompt: You are an efficient food navigation expert for a graduation project system. Reply directly with no greetings. Keep answers concise and structured in Markdown lists. Prioritize exact location matching from user input. If location is missing in data, return one short not-found sentence and one fallback option. Provide up to 3 recommendations, each with restaurant name, signature dish, and per-capita price, then one practical tip.
