server:
  port: 8080

spring:
  application:
    name: food-forum-backend
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 200MB
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/food_forum?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

app:
  upload-path: D:/Development/Projects/bylw/uploads
  upload:
    oss-enabled: ${APP_UPLOAD_OSS_ENABLED:true}
    endpoint: ${ALIYUN_OSS_ENDPOINT:oss-cn-hangzhou.aliyuncs.com}
    bucket: ${ALIYUN_OSS_BUCKET:food-forum-assets}
    access-key-id: ${ALIYUN_OSS_ACCESS_KEY_ID:}
    access-key-secret: ${ALIYUN_OSS_ACCESS_KEY_SECRET:}
    dir-prefix: ${ALIYUN_OSS_DIR_PREFIX:bylw/}
    public-base-url: ${ALIYUN_OSS_PUBLIC_BASE_URL:https://food-forum-assets.oss-cn-hangzhou.aliyuncs.com}
  auth:
    token-secret: bylw-food-forum-secret-key
    token-expire-hours: 168
  ai:
    enabled: ${APP_AI_ENABLED:true}
    base-url: ${APP_AI_BASE_URL:https://api.deepseek.com/v1}
    model: ${APP_AI_MODEL:deepseek-chat}
    api-key: ${DEEPSEEK_API_KEY:${OPENAI_API_KEY:}}
    system-prompt: 你是本地美食论坛的AI推荐官，请优先基于平台真实数据给出简洁、可执行的中文推荐。
